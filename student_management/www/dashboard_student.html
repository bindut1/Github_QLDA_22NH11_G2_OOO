{% extends "templates/web.html" %}

{% block page_content %}
<div class="container">
    <h1>Dashboard Student</h1>

    <!-- Table danh sách sinh viên -->
    <table class="table table-bordered">
        <thead>
            <tr>
                <th>Student ID</th>
                <th>Student Name</th>
                <th>Gender</th>
                <th>Class</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody id="student-table-body">
            <!-- Dữ liệu sẽ được load bằng JavaScript -->
        </tbody>
    </table>
</div>

<script>
    document.addEventListener("DOMContentLoaded", function () {
        loadStudents();
    });

    // Hàm load danh sách sinh viên
    async function loadStudents() {
        try {
            const response = await fetch("/api/method/student_management.student_management.doctype.student.student.get_students");
            const result = await response.json();

            const tableBody = document.getElementById("student-table-body");
            tableBody.innerHTML = "";

            if (result.message) {
                result.message.forEach(student => {
                    const row = `
                        <tr>
                            <td>${student.student_id}</td>
                            <td>${student.student_name}</td>
                            <td>${student.gender}</td>
                            <td>${student.class_name}</td>
                            <td>
                                <button class="btn btn-primary btn-sm" onclick="editStudent('${student.student_id}')">Edit</button>
                            </td>
                        </tr>
                    `;
                    tableBody.innerHTML += row;
                });
            }
        } catch (err) {
            console.error("Error loading students:", err);
        }
    }

    // Hàm chuyển hướng đến trang cập nhật
    function editStudent(student_id) {
        window.location.href = `/edit_student?student_id=${encodeURIComponent(student_id)}`;
    }

</script>
{% endblock %}
